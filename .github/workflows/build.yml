name: Build OpenSheet ET

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions:  read

env:
  APP_NAME: OpenSheetET
  # Qt 6.8.1 with msvc2022 — verified working arch string for aqt 3.3
  QT_VERSION: 6.8.1
  QT_ARCH:    win64_msvc2022_64

jobs:
  # ══════════════════════════════════════════════════════════════════
  #  Windows — build + windeployqt + NSIS installer + GitHub Release
  # ══════════════════════════════════════════════════════════════════
  build-windows:
    name: 🪟 Windows
    runs-on: windows-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Detect version
      - name: Detect version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER="1.0.0-dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "Version: ${VER}"

      # 3. Install Qt — jurplel/install-qt-action handles aqt correctly
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version:    ${{ env.QT_VERSION }}
          host:       windows
          target:     desktop
          arch:       ${{ env.QT_ARCH }}
          modules:    ''
          cache:      true
          cache-key-prefix: qt-${{ env.QT_VERSION }}-${{ env.QT_ARCH }}

      # 4. Setup MSVC 2022 x64
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 5. Configure CMake — QT_ROOT_DIR is set by jurplel/install-qt-action@v4
      - name: CMake configure
        shell: pwsh
        run: |
          # Priority: QT_ROOT_DIR (set by install-qt-action v4) → QTDIR → Qt6_DIR → search
          $qtPrefix = $env:QT_ROOT_DIR
          if (-not $qtPrefix) { $qtPrefix = $env:QTDIR }
          if (-not $qtPrefix) { $qtPrefix = $env:Qt6_DIR }
          if (-not $qtPrefix) {
            $cfg = Get-ChildItem "D:\a" -Recurse -Filter "Qt6Config.cmake" `
                   -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($cfg) { $qtPrefix = $cfg.Directory.FullName }
          }
          if (-not $qtPrefix) { Write-Error "Qt not found!"; exit 1 }
          Write-Host "Qt prefix: $qtPrefix"

          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_PREFIX_PATH=$qtPrefix" `
            -G "Visual Studio 17 2022" -A x64

      # 6. Build
      - name: Build
        run: cmake --build build --config Release --parallel 4

      # 7. Find .exe (handles different output directory layouts)
      - name: Find executable
        id: exe
        shell: pwsh
        run: |
          $candidates = @(
            "build\Release\${{ env.APP_NAME }}.exe",
            "build\${{ env.APP_NAME }}.exe",
            "build\app\Release\${{ env.APP_NAME }}.exe"
          )
          $found = $null
          foreach ($c in $candidates) { if (Test-Path $c) { $found = $c; break } }
          if (-not $found) {
            $found = (Get-ChildItem -Recurse -Filter "${{ env.APP_NAME }}.exe" -ErrorAction SilentlyContinue | Select-Object -First 1)?.FullName
          }
          if (-not $found) {
            Write-Error "Executable not found. Build output:"
            Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName
            exit 1
          }
          Write-Host "EXE: $found"
          echo "path=$found" >> $env:GITHUB_OUTPUT

      # 8. windeployqt — bundle Qt DLLs
      - name: Run windeployqt
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force deploy | Out-Null
          Copy-Item "${{ steps.exe.outputs.path }}" deploy\

          $wd = Get-Item "$env:QT_ROOT_DIR\bin\windeployqt.exe" -ErrorAction SilentlyContinue
          if (-not $wd) {
            $wd = Get-ChildItem "D:\a" -Recurse -Filter windeployqt.exe -ErrorAction SilentlyContinue |
                  Select-Object -First 1
          }
          if (-not $wd) { Write-Error "windeployqt not found"; exit 1 }
          Write-Host "windeployqt: $($wd.FullName)"

          & $wd.FullName `
            --dir deploy --release `
            --no-translations --no-system-d3d-compiler --no-opengl-sw `
            "deploy\${{ env.APP_NAME }}.exe"

          Write-Host "Deploy dir:"
          Get-ChildItem deploy | Format-Table -AutoSize

      # 9. Portable ZIP
      - name: Create portable ZIP
        id: zip
        shell: pwsh
        run: |
          $name = "${{ env.APP_NAME }}-${{ steps.ver.outputs.version }}-Windows-Portable.zip"
          Compress-Archive -Path "deploy\*" -DestinationPath $name -CompressionLevel Optimal
          Write-Host "ZIP: $name ($([math]::round((Get-Item $name).length/1MB,1)) MB)"
          echo "name=$name" >> $env:GITHUB_OUTPUT

      # 10. Install NSIS
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --no-progress -y | Out-Null
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (Test-Path $nsisPath) {
            echo "$nsisPath" >> $env:GITHUB_PATH
            Write-Host "NSIS installed OK"
          }

      # 11. Patch version in NSI script
      - name: Patch NSI version
        shell: pwsh
        run: |
          $v   = "${{ steps.ver.outputs.version }}"
          $nsi = Get-Content installer\OpenSheetET.nsi -Raw
          $nsi = $nsi -replace '(!define APP_VERSION\s+")[^"]*"', "`${1}${v}`""
          $nsi = $nsi -replace '(OutFile\s+")[^"]*"',
                      "`${1}..\${{ env.APP_NAME }}-${v}-Setup.exe`""
          Set-Content installer\OpenSheetET.nsi $nsi -Encoding UTF8
          Write-Host "Patched: version=$v"

      # 12. Build NSIS installer
      - name: Build installer
        id: nsis
        shell: pwsh
        run: |
          $v     = "${{ steps.ver.outputs.version }}"
          $setup = "${{ env.APP_NAME }}-${v}-Setup.exe"

          if (-not (Test-Path LICENSE.txt)) {
            "MIT License`nCopyright 2025 OpenSheet" | Out-File LICENSE.txt -Encoding UTF8
          }

          Push-Location installer
          makensis /V3 OpenSheetET.nsi
          $rc = $LASTEXITCODE
          Pop-Location

          if ($rc -eq 0 -and (Test-Path $setup)) {
            Write-Host "Installer: $setup ($([math]::round((Get-Item $setup).length/1MB,1)) MB)"
            echo "name=$setup" >> $env:GITHUB_OUTPUT
          } else {
            Write-Warning "NSIS failed (rc=$rc) — no installer artifact"
            echo "name=" >> $env:GITHUB_OUTPUT
          }

      # 13. Upload portable ZIP artifact
      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-Portable
          path: ${{ steps.zip.outputs.name }}
          retention-days: 30

      # 14. Upload installer artifact
      - name: Upload installer
        if: steps.nsis.outputs.name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-Installer
          path: ${{ steps.nsis.outputs.name }}
          retention-days: 30

      # 15. GitHub Release on version tags
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "OpenSheet ET ${{ steps.ver.outputs.version }}"
          prerelease: ${{ contains(github.ref_name,'-beta') || contains(github.ref_name,'-rc') }}
          body: |
            ## OpenSheet ET ${{ steps.ver.outputs.version }}

            ### Downloads
            | File | Description |
            |------|-------------|
            | `*-Setup.exe` | Windows Installer (recommended) |
            | `*-Portable.zip` | Portable — no install needed |

            **Requirements:** Windows 10/11 x64

            Built from commit `${{ github.sha }}`
          files: |
            ${{ steps.nsis.outputs.name }}
            ${{ steps.zip.outputs.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════════════════════
  #  Linux Build
  # ══════════════════════════════════════════════════════════════════
  build-linux:
    name: 🐧 Linux (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev qt6-base-dev-tools \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-dev libxcb-glx0-dev libxcb-util-dev \
            libxcb-xkb-dev libxcb-icccm4-dev libxcb-image0-dev \
            libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-shape0-dev libxcb-xinerama0-dev \
            cmake ninja-build g++

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux
          path: build/${{ env.APP_NAME }}
          retention-days: 14
