name: Build OpenSheet ET

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions:  read

env:
  APP_NAME:   OpenSheetET
  QT_VERSION: 6.8.1
  QT_ARCH:    win64_msvc2022_64

jobs:
  # ════════════════════════════════════════════════════════════════════
  #  Windows — build → windeployqt → NSIS installer → GitHub Release
  # ════════════════════════════════════════════════════════════════════
  build-windows:
    name: 🪟 Windows (Qt ${{ env.QT_VERSION }})
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Version ───────────────────────────────────────────────────
      - name: Set version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER="1.0.0-dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "Version: ${VER}"

      # ── 3. Install Qt ─────────────────────────────────────────────────
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version:    ${{ env.QT_VERSION }}
          host:       windows
          target:     desktop
          arch:       ${{ env.QT_ARCH }}
          modules:    ''
          cache:      true
          cache-key-prefix: qt-${{ env.QT_VERSION }}-${{ env.QT_ARCH }}

      # ── 4. MSVC 2022 x64 ─────────────────────────────────────────────
      - name: Setup MSVC 2022
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 5. CMake configure ────────────────────────────────────────────
      # jurplel/install-qt-action@v4 sets QT_ROOT_DIR to the Qt install dir,
      # e.g. D:\a\OpenSheet\Qt\6.8.1\msvc2022_64
      # Pass it directly as CMAKE_PREFIX_PATH so find_package(Qt6) succeeds.
      - name: CMake configure
        shell: pwsh
        run: |
          $qt = $env:QT_ROOT_DIR
          Write-Host "QT_ROOT_DIR = $qt"
          if (-not $qt -or -not (Test-Path $qt)) {
            Write-Error "QT_ROOT_DIR not set or path doesn't exist: '$qt'"
            exit 1
          }
          # Verify Qt6Config.cmake is reachable
          $cfg = "$qt\lib\cmake\Qt6\Qt6Config.cmake"
          if (Test-Path $cfg) {
            Write-Host "Qt6Config.cmake found: $cfg"
          } else {
            Write-Warning "Qt6Config.cmake not at expected path — CMake will search"
          }
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_PREFIX_PATH=$qt" `
            -G "Visual Studio 17 2022" `
            -A x64

      # ── 6. Build ──────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel 4

      # ── 7. Find .exe ──────────────────────────────────────────────────
      - name: Find executable
        id: exe
        shell: pwsh
        run: |
          $candidates = @(
            "build\Release\${{ env.APP_NAME }}.exe",
            "build\${{ env.APP_NAME }}.exe",
            "build\app\Release\${{ env.APP_NAME }}.exe"
          )
          $path = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) { $path = $c; break }
          }
          if (-not $path) {
            Write-Host "Searching recursively..."
            $path = (Get-ChildItem -Recurse -Filter "${{ env.APP_NAME }}.exe" `
                      -ErrorAction SilentlyContinue | Select-Object -First 1)?.FullName
          }
          if (-not $path) {
            Write-Error "Executable not found. Build output:"
            Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName
            exit 1
          }
          Write-Host "EXE: $path"
          echo "path=$path" >> $env:GITHUB_OUTPUT

      # ── 8. windeployqt ────────────────────────────────────────────────
      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force deploy | Out-Null
          Copy-Item "${{ steps.exe.outputs.path }}" deploy\

          # windeployqt lives in QT_ROOT_DIR\bin\
          $wd = "$env:QT_ROOT_DIR\bin\windeployqt.exe"
          if (-not (Test-Path $wd)) {
            # Fallback search
            $wd = (Get-ChildItem -Path $env:QT_ROOT_DIR -Filter windeployqt.exe `
                    -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1)?.FullName
          }
          if (-not $wd) { Write-Error "windeployqt not found"; exit 1 }
          Write-Host "windeployqt: $wd"

          & $wd `
            --dir deploy `
            --release `
            --no-translations `
            --no-system-d3d-compiler `
            --no-opengl-sw `
            "deploy\${{ env.APP_NAME }}.exe"

          Write-Host "`nDeploy contents:"
          Get-ChildItem deploy | Format-Table Name, Length -AutoSize

      # ── 9. Portable ZIP ───────────────────────────────────────────────
      - name: Create portable ZIP
        id: zip
        shell: pwsh
        run: |
          $name = "${{ env.APP_NAME }}-${{ steps.ver.outputs.version }}-Windows-Portable.zip"
          Compress-Archive -Path "deploy\*" -DestinationPath $name -CompressionLevel Optimal
          $mb = [math]::round((Get-Item $name).length / 1MB, 1)
          Write-Host "ZIP: $name ($mb MB)"
          echo "name=$name" >> $env:GITHUB_OUTPUT

      # ── 10. Install NSIS ──────────────────────────────────────────────
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --no-progress -y | Out-Null
          $p = "C:\Program Files (x86)\NSIS"
          if (Test-Path $p) {
            echo "$p" >> $env:GITHUB_PATH
            Write-Host "NSIS ready"
          }

      # ── 11. Patch NSI version ─────────────────────────────────────────
      - name: Patch installer version
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $nsi = Get-Content installer\OpenSheetET.nsi -Raw
          $nsi = $nsi -replace '(!define APP_VERSION\s+")[^"]*"', "`${1}${v}`""
          $nsi = $nsi -replace '(OutFile\s+")[^"]*"',
                      "`${1}..\${{ env.APP_NAME }}-${v}-Setup.exe`""
          Set-Content installer\OpenSheetET.nsi $nsi -Encoding UTF8
          Write-Host "Patched: version = $v"

      # ── 12. Build NSIS installer ──────────────────────────────────────
      - name: Build installer
        id: nsis
        shell: pwsh
        run: |
          $v     = "${{ steps.ver.outputs.version }}"
          $setup = "${{ env.APP_NAME }}-${v}-Setup.exe"

          if (-not (Test-Path LICENSE.txt)) {
            "MIT License`nCopyright 2025 OpenSheet" | Out-File LICENSE.txt -Encoding UTF8
          }

          Push-Location installer
          makensis /V3 OpenSheetET.nsi
          $rc = $LASTEXITCODE
          Pop-Location

          if ($rc -eq 0 -and (Test-Path $setup)) {
            $mb = [math]::round((Get-Item $setup).length / 1MB, 1)
            Write-Host "Installer: $setup ($mb MB)"
            echo "name=$setup" >> $env:GITHUB_OUTPUT
          } else {
            Write-Warning "NSIS failed (exit $rc)"
            echo "name=" >> $env:GITHUB_OUTPUT
          }

      # ── 13. Upload artifacts ──────────────────────────────────────────
      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-Portable
          path: ${{ steps.zip.outputs.name }}
          retention-days: 30

      - name: Upload installer
        if: steps.nsis.outputs.name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-Installer
          path: ${{ steps.nsis.outputs.name }}
          retention-days: 30

      # ── 14. GitHub Release on version tags ───────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "OpenSheet ET ${{ steps.ver.outputs.version }}"
          prerelease: ${{ contains(github.ref_name,'-beta') || contains(github.ref_name,'-rc') }}
          body: |
            ## OpenSheet ET ${{ steps.ver.outputs.version }}

            ### Downloads
            | File | Description |
            |------|-------------|
            | `*-Setup.exe` | Windows Installer — includes Start Menu + file association |
            | `*-Portable.zip` | Portable — extract and run, no install needed |

            **Requirements:** Windows 10/11 x64

            Built from `${{ github.sha }}`
          files: |
            ${{ steps.nsis.outputs.name }}
            ${{ steps.zip.outputs.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════
  #  Linux Build
  # ════════════════════════════════════════════════════════════════════
  build-linux:
    name: 🐧 Linux (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev qt6-base-dev-tools \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-dev libxcb-glx0-dev libxcb-util-dev \
            libxcb-xkb-dev libxcb-icccm4-dev libxcb-image0-dev \
            libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-shape0-dev libxcb-xinerama0-dev \
            cmake ninja-build g++

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux
          path: build/${{ env.APP_NAME }}
          retention-days: 14
